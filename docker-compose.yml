services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: daphne -b 0.0.0.0 -p 8000 config.asgi:application
    volumes:
      - ./backend:/app
      - ./media:/app/media
      - static_data:/app/staticfiles
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
      POSTGRES_HOST: db
      REDIS_CACHE_URL: redis://redis:6379/1
      REDIS_CHANNELS_URL: redis://redis:6379/2
      REDIS_CELERY_URL: redis://redis:6379/3
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A config.celery_app worker --loglevel=info --concurrency=4
    volumes:
      - ./backend:/app
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
      POSTGRES_HOST: db
      REDIS_CACHE_URL: redis://redis:6379/1
      REDIS_CHANNELS_URL: redis://redis:6379/2
      REDIS_CELERY_URL: redis://redis:6379/3
      C_FORCE_ROOT: "true"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: >
      celery -A config.celery_app flower
      --port=5555
      --broker=redis://redis:6379/3
    entrypoint: []
    ports:
      - "5555:5555"
    env_file: .env
    environment:
      REDIS_CELERY_URL: redis://redis:6379/3
    depends_on:
      - redis
      - celery

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_data:/app/staticfiles:ro
      - ./media:/app/media
    depends_on:
      - backend

volumes:
  postgres_data:
  static_data:
